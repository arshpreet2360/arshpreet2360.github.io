<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory Lookup</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Papa Parse Library to read CSV data -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start p-6 font-sans">

    <div class="w-full max-w-2xl bg-white rounded-xl shadow-md border border-slate-100 p-8 mt-10">
        <h1 class="text-3xl font-extrabold text-slate-800 text-center mb-2">Classroom Finder</h1>
        <p class="text-slate-500 text-center mb-8">Type a class identifier to pull real-time rosters directly from your sheet.</p>

        <!-- Search input group -->
        <div class="flex gap-3 mb-8">
            <input 
                type="text" 
                id="classInput" 
                placeholder="Enter class name (e.g., CSE-A)..." 
                class="flex-1 px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition text-slate-700"
            />
            <button 
                onclick="searchClass()" 
                class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
            >
                Search
            </button>
        </div>

        <!-- Loading Indicator -->
        <div id="loadingState" class="text-center py-4 text-indigo-600 font-semibold">
            Loading student directory data...
        </div>

        <!-- Result Display Area -->
        <div id="resultsArea" class="hidden">
            <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-4">
                <h2 class="text-xl font-bold text-slate-700">
                    Results for <span id="currentClassName" class="text-indigo-600"></span>
                </h2>
                <span id="studentCount" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-2.5 py-1 rounded-full"></span>
            </div>
            
            <ul id="studentsList" class="divide-y divide-slate-100">
                <!-- Data will go here dynamically -->
            </ul>
        </div>

        <!-- Empty State / Error message -->
        <div id="emptyState" class="hidden text-center py-10">
            <p id="emptyText" class="text-slate-400 text-lg">No students found for that class code.</p>
        </div>
    </div>

    <script>
        let parsedDatabase = [];

        // Fetch and parse the CSV file when the website loads
        window.addEventListener('DOMContentLoaded', () => {
            // "students.csv" must be saved in the exact same GitHub folder
            Papa.parse('students.csv', {
                download: true,
                header: true, // Uses the first row of your Excel sheet as headers (Class, Roll, Name)
                skipEmptyLines: true,
                complete: function(results) {
                    parsedDatabase = results.data;
                    document.getElementById("loadingState").classList.add("hidden");
                },
                error: function(err) {
                    console.error("Error parsing CSV:", err);
                    document.getElementById("loadingState").textContent = "Error loading spreadsheet database.";
                }
            });
        });
